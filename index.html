<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pacific Tide – Games</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #0099cc;
      --blue-glow: rgba(0,153,204,0.3);
      --bg: #060c10;
      --surface: #0f1c26;
      --border: rgba(0,153,204,0.18);
      --text: #ddeef5;
      --muted: #5a8fa8;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Nunito", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* TOP BAR */
    .topbar {
      height: 52px;
      background: var(--blue);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 16px rgba(0,153,204,0.4);
      flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .brand-logo { height: 34px; width: auto; object-fit: contain; }
    .brand-name { font-family: "Rajdhani", sans-serif; font-weight: 700; font-size: 1.3rem; color: #000; letter-spacing: .04em; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .discord-btn {
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,0.18); border: none; border-radius: 16px;
      padding: 5px 12px; color: #000;
      font-family: "Rajdhani", sans-serif; font-weight: 700; font-size: .9rem;
      cursor: pointer; text-decoration: none;
      transition: background .15s, transform .15s;
    }
    .discord-btn:hover { background: rgba(0,0,0,.3); transform: scale(1.03); }
    .discord-btn:active { transform: scale(.97); }
    .gear-btn {
      width: 32px; height: 32px; border: none;
      background: rgba(0,0,0,.15); border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .gear-btn:hover { background: rgba(0,0,0,.28); }
    .gear-btn:hover svg { transform: rotate(45deg); }
    .gear-btn svg { transition: transform .35s; }

    /* HERO */
    .hero {
      text-align: center;
      padding: 52px 20px 44px;
      position: relative;
      flex-shrink: 0;
    }
    .hero::after {
      content: "";
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .hero-logo {
      width: 210px; margin: 0 auto 18px;
      display: block;
      filter: drop-shadow(0 0 22px rgba(0,153,204,0.55));
      animation: wavebob 4s ease-in-out infinite;
    }
    @keyframes wavebob {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    .hero h1 {
      font-family: "Rajdhani", sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700; letter-spacing: .08em; color: #fff;
    }
    .hero p { color: var(--muted); font-size: .95rem; margin-top: 6px; }

    /* PROXY SECTION */
    .proxy-section {
      max-width: 700px;
      margin: 38px auto 0;
      padding: 0 20px;
      width: 100%;
      flex-shrink: 0;
    }
    .proxy-bar {
      display: flex;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .proxy-bar:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }
    .proxy-bar-icon {
      display: flex; align-items: center;
      padding: 0 14px; opacity: .45; flex-shrink: 0;
    }
    .proxy-input {
      flex: 1; height: 50px;
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: "Nunito", sans-serif; font-size: 1rem;
      padding: 0 4px;
    }
    .proxy-input::placeholder { color: var(--muted); }
    .proxy-go {
      height: 50px; padding: 0 20px;
      background: var(--blue); border: none;
      color: #000; font-family: "Rajdhani", sans-serif;
      font-weight: 700; font-size: .95rem; letter-spacing: .04em;
      cursor: pointer; flex-shrink: 0;
      transition: background .15s;
    }
    .proxy-go:hover { background: #1ab8e8; }
    .proxy-go:active { background: #007aaa; }

    /* Nav buttons */
    .proxy-nav {
      display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
    }
    .nav-btn {
      height: 36px; padding: 0 18px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-family: "Rajdhani", sans-serif; font-weight: 600;
      font-size: .9rem; letter-spacing: .04em; text-transform: uppercase;
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s, transform .12s;
    }
    .nav-btn:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-1px); }
    .nav-btn:active { transform: scale(.97); }
    .nav-btn.active { background: var(--blue); border-color: var(--blue); color: #000; }

    /* IFRAME */
    .iframe-wrap {
      display: none; flex: 1;
      margin: 20px; border-radius: 12px; overflow: hidden;
      border: 1.5px solid var(--border); min-height: 500px;
    }
    .iframe-wrap.visible { display: flex; flex-direction: column; }
    .iframe-toolbar {
      background: #0d1a24; border-bottom: 1px solid rgba(0,153,204,0.2);
      display: flex; align-items: center; gap: 10px; padding: 0 14px; height: 44px;
    }
    .proxy-traffic-lights {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
    }
    .ptl {
      width: 13px; height: 13px; border-radius: 50%;
      border: none; cursor: pointer; position: relative;
      transition: filter .15s; flex-shrink: 0;
    }
    .ptl:hover { filter: brightness(1.2); }
    .ptl:active { filter: brightness(.8); }
    .ptl-red    { background: #ff5f57; }
    .ptl-yellow { background: #febc2e; }
    .ptl-green  { background: #28c840; }
    .ptl span {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 9px; font-weight: 900; color: rgba(0,0,0,0.5); line-height: 1;
    }
    .proxy-traffic-lights:hover .ptl span { display: block; }
    .iframe-close { display: none; }
    .iframe-url {
      flex: 1; height: 28px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 0 10px;
      color: var(--muted); font-size: .8rem; font-family: "Nunito", sans-serif;
      outline: none;
    }
    .proxy-frame { flex: 1; width: 100%; border: none; min-height: 500px; background: #fff; }

    /* GAMES SECTION */
    .games-section {
      display: none;
      max-width: 1100px;
      margin: 24px auto 0;
      padding: 0 20px 60px;
      width: 100%;
    }
    .games-section.visible { display: block; }

    /* Search */
    .game-search-wrap { position: relative; margin-bottom: 20px; }
    .game-search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); pointer-events: none;
    }
    .game-search-input {
      width: 100%; height: 44px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 14px 0 44px;
      color: var(--text); font-family: "Nunito", sans-serif; font-size: .95rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .game-search-input::placeholder { color: var(--muted); }
    .game-search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }

    /* Grid */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }
    .game-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px; overflow: hidden;
      text-decoration: none; display: flex; flex-direction: column;
      transition: border-color .18s, transform .2s cubic-bezier(.34,1.4,.64,1), box-shadow .18s;
    }
    .game-card:hover {
      border-color: var(--blue); transform: translateY(-5px);
      box-shadow: 0 10px 28px rgba(0,153,204,0.2);
    }
    .game-card:active { transform: translateY(-1px) scale(.99); }
    .card-thumb {
      width: 100%; aspect-ratio: 460/215;
      background: #0b1620; overflow: hidden; position: relative;
    }
    .card-thumb img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .3s ease;
    }
    .game-card:hover .card-thumb img { transform: scale(1.05); }
    .card-thumb .fallback {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; background: #0b1620;
    }
    .card-info { padding: 10px 12px 12px; }
    .card-title {
      font-family: "Rajdhani", sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-play {
      display: block; width: 100%;
      background: var(--blue); color: #000;
      border: none; border-radius: 7px; padding: 6px 0;
      font-family: "Rajdhani", sans-serif; font-weight: 700; font-size: .88rem;
      cursor: pointer; transition: background .12s, transform .12s;
    }
    .card-play:hover { background: #1ab8e8; }
    .card-play:active { transform: scale(.96); }
    .no-results {
      grid-column: 1/-1; text-align: center;
      padding: 60px 0; color: var(--muted);
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 18px; text-align: center;
      font-size: .78rem; color: var(--muted);
      margin-top: auto;
    }
    footer a { color: var(--blue); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .hero { padding: 36px 16px 32px; }
      .hero-logo { width: 160px; }
      .proxy-section, .games-section { padding-left: 14px; padding-right: 14px; }
      .iframe-wrap { margin: 14px; }
    }

    #gameOverlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: #000; flex-direction: column;
    }
    .overlay-bar {
      height: 44px; background: #0d1a24;
      border-bottom: 1px solid rgba(0,153,204,0.2);
      display: flex; align-items: center; gap: 10px; padding: 0 14px; flex-shrink: 0;
    }
    /* macOS traffic lights */
    .traffic-lights {
      display: flex; align-items: center; gap: 7px; flex-shrink: 0;
    }
    .tl {
      width: 13px; height: 13px; border-radius: 50%;
      border: none; cursor: pointer; position: relative;
      transition: filter .15s;
    }
    .tl:hover { filter: brightness(1.2); }
    .tl:active { filter: brightness(.8); }
    .tl-red   { background: #ff5f57; }
    .tl-yellow{ background: #febc2e; }
    .tl-green { background: #28c840; }
    .tl span {
      display: none; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      font-size: 9px; font-weight: 900; color: rgba(0,0,0,0.5);
      line-height: 1;
    }
    .traffic-lights:hover .tl span { display: block; }
    .overlay-divider {
      width: 1px; height: 22px;
      background: rgba(0,153,204,0.2); flex-shrink: 0;
    }
    .overlay-home {
      background: rgba(0,153,204,0.1); border: 1px solid rgba(0,153,204,0.25);
      border-radius: 6px; padding: 3px 12px;
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: .85rem;
      color: #0099cc; cursor: pointer; transition: background .15s, transform .12s;
    }
    .overlay-home:hover { background: rgba(0,153,204,0.25); transform: scale(1.03); }
    .overlay-home:active { transform: scale(.97); }
    .overlay-title {
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      font-size: .95rem; color: #5a8fa8; flex: 1;
    }
    .overlay-newtab {
      background: rgba(0,153,204,0.12); border: 1px solid rgba(0,153,204,0.3);
      border-radius: 6px; padding: 3px 10px;
      font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: .8rem;
      color: #0099cc; text-decoration: none; transition: background .15s;
    }
    .overlay-newtab:hover { background: rgba(0,153,204,0.28); }
    #gameFrame { flex: 1; width: 100%; border: none; background: #000; }

    /* SETTINGS PANEL */
    .settings-overlay {
      display: none; position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .settings-overlay.open { display: flex; }
    .settings-panel {
      background: #0d1a24; border: 1.5px solid rgba(0,153,204,0.3);
      border-radius: 16px; width: min(420px, 92vw);
      overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .settings-titlebar {
      background: #0a1520; border-bottom: 1px solid rgba(0,153,204,0.2);
      display: flex; align-items: center; gap: 10px; padding: 0 14px; height: 44px;
    }
    .settings-tl {
      width: 13px; height: 13px; border-radius: 50%;
      border: none; cursor: pointer; background: #ff5f57;
      transition: filter .15s;
    }
    .settings-tl:hover { filter: brightness(1.2); }
    .settings-title {
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 1rem; color: var(--text); flex: 1; text-align: center;
      letter-spacing: .06em;
    }
    .settings-body { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
    .settings-row { display: flex; flex-direction: column; gap: 8px; }
    .settings-label {
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      font-size: .85rem; color: var(--muted); letter-spacing: .06em; text-transform: uppercase;
    }
    .settings-input {
      width: 100%; height: 42px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 0 14px;
      color: var(--text); font-family: 'Nunito', sans-serif; font-size: .95rem;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .settings-input:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow);
    }
    .settings-save {
      height: 42px; background: var(--blue); border: none; border-radius: 8px;
      color: #000; font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 1rem; letter-spacing: .04em; cursor: pointer;
      transition: background .15s, transform .12s;
    }
    .settings-save:hover { background: #1ab8e8; }
    .settings-save:active { transform: scale(.97); }
    .settings-hint { font-size: .75rem; color: var(--muted); margin-top: -4px; }

    /* MINIMIZED PLAYER */
    .mini-player {
      display: none; position: fixed;
      bottom: 20px; right: 20px; z-index: 9998;
      width: 280px; height: 180px;
      border-radius: 12px; overflow: hidden;
      border: 2px solid var(--blue);
      box-shadow: 0 8px 32px rgba(0,153,204,0.4);
      cursor: pointer; transition: transform .2s, box-shadow .2s;
    }
    .mini-player.visible { display: block; }
    .mini-player:hover { transform: scale(1.03); box-shadow: 0 12px 40px rgba(0,153,204,0.5); }
    .mini-player-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 30px; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; gap: 8px; padding: 0 10px;
      z-index: 1;
    }
    .mini-player-title {
      font-family: 'Rajdhani', sans-serif; font-weight: 600;
      font-size: .8rem; color: #fff; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mini-expand {
      background: rgba(255,255,255,0.15); border: none; border-radius: 4px;
      color: #fff; font-size: .7rem; padding: 2px 6px; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      transition: background .15s;
    }
    .mini-expand:hover { background: rgba(255,255,255,0.3); }
    .mini-close-btn {
      background: #ff5f57; border: none; border-radius: 50%;
      width: 12px; height: 12px; cursor: pointer; flex-shrink: 0;
    }
    .mini-frame {
      width: 100%; height: 100%; border: none;
      pointer-events: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

function showError(container, msg) {
  container.innerHTML = `<div style="color:#fff;display:flex;align-items:center;justify-content:center;height:100%;font-family:Rajdhani,sans-serif;font-size:1.1rem;flex-direction:column;gap:12px;padding:20px;text-align:center;">
    <div style="font-size:2rem;">&#9888;</div>
    <div>Could not load game</div>
    <div style="font-size:.8rem;color:#5a8fa8;">${msg}</div>
  </div>`;
}

function waitForRuffle(cb, tries) {
  tries = tries || 0;
  if (window.RufflePlayer && window.RufflePlayer.newest) {
    cb();
  } else if (tries < 40) {
    setTimeout(() => waitForRuffle(cb, tries + 1), 150);
  } else {
    cb(true); // timeout
  }
}

function launchGame(g) {
  const overlay   = document.getElementById("gameOverlay");
  const titleEl   = document.getElementById("overlayTitle");
  const newTabBtn = document.getElementById("overlayNewTab");
  const container = document.getElementById("ruffleContainer");

  titleEl.textContent = g.title;
  newTabBtn.href = g.url;
  container.innerHTML = `<div style="color:#5a8fa8;display:flex;align-items:center;justify-content:center;height:100%;font-family:Rajdhani,sans-serif;font-size:1rem;gap:10px;">
    <span style="display:inline-block;animation:spin 1s linear infinite;">&#9696;</span> Loading...
  </div>`;
  overlay.style.display = "flex";
  document.body.style.overflow = "hidden";

  waitForRuffle(function(timedOut) {
    if (timedOut || !window.RufflePlayer) {
      showError(container, "Ruffle player failed to load. Check your connection.");
      return;
    }
    try {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      player.style.width  = "100%";
      player.style.height = "100%";
      player.style.display = "block";
      container.innerHTML = "";
      container.appendChild(player);
      player.load({
        url: g.url,
        allowScriptAccess: "always",
        backgroundColor: "#000000",
        autoplay: "on",
      }).catch(err => showError(container, err.message || "Failed to fetch game file."));
    } catch(e) {
      showError(container, e.message);
    }
  });
}

// Generate a unique gradient thumbnail per game using canvas
function makeThumb(title) {
  const canvas = document.createElement("canvas");
  canvas.width = 460; canvas.height = 215;
  const ctx = canvas.getContext("2d");

  // Hash title to get consistent colors
  let h1 = 0, h2 = 0;
  for (let i = 0; i < title.length; i++) {
    h1 = (h1 * 31 + title.charCodeAt(i)) & 0xffffff;
    h2 = (h2 * 37 + title.charCodeAt(title.length - 1 - i)) & 0xffffff;
  }
  const hue1 = h1 % 360;
  const hue2 = (hue1 + 40 + (h2 % 60)) % 360;

  // Dark gradient background
  const grad = ctx.createLinearGradient(0, 0, 460, 215);
  grad.addColorStop(0, `hsl(${hue1},55%,14%)`);
  grad.addColorStop(1, `hsl(${hue2},60%,10%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 460, 215);

  // Subtle radial glow
  const glow = ctx.createRadialGradient(230, 108, 20, 230, 108, 160);
  glow.addColorStop(0, `hsla(${hue1},70%,55%,0.18)`);
  glow.addColorStop(1, "transparent");
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, 460, 215);

  // Decorative circle
  ctx.beginPath();
  ctx.arc(230, 90, 38, 0, Math.PI * 2);
  ctx.strokeStyle = `hsla(${hue1},70%,60%,0.4)`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Flash lightning bolt icon
  ctx.fillStyle = `hsl(${hue1},80%,65%)`;
  ctx.font = "bold 36px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("⚡", 230, 90);

  // Game title
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.font = "bold 18px Rajdhani, Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  // Word wrap if needed
  const words = title.split(" ");
  let lines = [], line = "";
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > 400) { lines.push(line); line = w; }
    else line = test;
  }
  lines.push(line);
  const lineH = 22;
  const startY = 155 + (lines.length === 1 ? 0 : -lineH / 2);
  lines.forEach((l, i) => ctx.fillText(l, 230, startY + i * lineH));

  // Bottom accent bar
  const bar = ctx.createLinearGradient(0, 205, 460, 205);
  bar.addColorStop(0, "transparent");
  bar.addColorStop(0.5, `hsla(${hue1},80%,55%,0.7)`);
  bar.addColorStop(1, "transparent");
  ctx.fillStyle = bar;
  ctx.fillRect(0, 205, 460, 10);

  return canvas.toDataURL("image/jpeg", 0.85);
}

function makeCard(g) {
  const a = document.createElement("a");
  a.className = "game-card";
  a.href = "#";
  a.addEventListener("click", e => { e.preventDefault(); _lastGame = g; launchGame(g); });

  const thumb = document.createElement("div");
  thumb.className = "card-thumb";
  const img = document.createElement("img");
  img.src = makeThumb(g.title);
  img.alt = g.title;
  img.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
  thumb.appendChild(img);

  const info = document.createElement("div");
  info.className = "card-info";
  info.innerHTML = `<div class="card-title">${g.title}</div><button class="card-play">&#9654; Play Now</button>`;

  a.appendChild(thumb);
  a.appendChild(info);
  return a;
}

function render(games) {
  const grid = document.getElementById("gameGrid");
  grid.innerHTML = "";
  if (!games.length) { grid.innerHTML = '<div class="no-results">No games found.</div>'; return; }
  games.forEach(g => grid.appendChild(makeCard(g)));
}
render(GAMES);

document.getElementById("gameSearch").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  render(q ? GAMES.filter(g => g.title.toLowerCase().includes(q)) : GAMES);
});

// Proxy
function scramjetURL(input) {
  let url = input.trim();
  if (!url) return null;
  if (!url.includes(".") || url.includes(" "))
    url = "https://www.google.com/search?q=" + encodeURIComponent(url);
  else if (!/^https?:\/\//.test(url)) url = "https://" + url;
  return "/scramjet/" + btoa(url);
}
function navigate(input) {
  document.getElementById("proxySection").style.display = "";
  const proxied = scramjetURL(input);
  if (!proxied) return;
  const raw = input.trim().includes(".") && !input.includes(" ")
    ? (input.startsWith("http") ? input : "https://" + input)
    : "https://www.google.com/search?q=" + encodeURIComponent(input);
  document.getElementById("iframeUrlBar").value = raw;
  document.getElementById("proxyFrame").src = proxied;
  document.getElementById("iframeWrap").classList.add("visible");
  document.getElementById("gamesSection").classList.remove("visible");
  document.getElementById("gamesBtn").classList.remove("active");
}
document.getElementById("proxyGo").addEventListener("click", () => navigate(document.getElementById("proxyInput").value));
document.getElementById("proxyInput").addEventListener("keydown", e => { if (e.key === "Enter") navigate(document.getElementById("proxyInput").value); });

function showGames() {
  document.getElementById("iframeWrap").classList.remove("visible");
  document.getElementById("gamesSection").classList.add("visible");
  document.getElementById("proxySection").style.display = "none";
  setActiveNav("games");
  document.getElementById("proxyInput").value = "";
}
document.getElementById("gamesBtn").addEventListener("click", showGames);
document.getElementById("iframeClose").addEventListener("click", () => {
  document.getElementById("proxyFrame").src = "";
  showGames();
});
function navTo(url) {
  document.getElementById("proxyInput").value = url;
  navigate(url);
  document.getElementById("gamesBtn").classList.remove("active");
}
document.getElementById("homeBtn").addEventListener("click", function() {
  document.getElementById("iframeWrap").classList.remove("visible");
  document.getElementById("gamesSection").classList.remove("visible");
  document.getElementById("proxySection").style.display = "";
  document.getElementById("proxyFrame").src = "";
  document.getElementById("proxyInput").value = "";
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("homeBtn").classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
});
document.getElementById("youtubeBtn").addEventListener("click", () => navTo("https://www.youtube.com"));
document.getElementById("googleBtn").addEventListener("click", () => navTo("https://www.google.com"));
</script>

<div id="gameOverlay">
  <div class="overlay-bar">
    <div class="traffic-lights">
      <button class="tl tl-red"    id="overlayClose"  title="Close"><span>&#x2715;</span></button>
      <button class="tl tl-yellow" id="overlayMin"    title="Minimize"><span>&#x2212;</span></button>
      <button class="tl tl-green"  id="overlayFull"   title="Fullscreen"><span>&#x2B22;</span></button>
    </div>
    <div class="overlay-divider"></div>
    <button class="overlay-home" id="overlayHome">&#127968; Home</button>
    <span class="overlay-title" id="overlayTitle"></span>
    <a class="overlay-newtab" id="overlayNewTab" href="#" target="_blank">&#8599; New Tab</a>
  </div>
  <div id="ruffleContainer" style="flex:1;width:100%;background:#000;display:flex;align-items:center;justify-content:center;"></div>
</div>
<script>
function closeOverlay() {
  document.getElementById('ruffleContainer').innerHTML = '';
  document.getElementById('gameOverlay').style.display = 'none';
  document.body.style.overflow = '';
  if (document.fullscreenElement) document.exitFullscreen();
}
document.getElementById('overlayClose').addEventListener('click', closeOverlay);

document.getElementById('overlayHome').addEventListener('click', function() {
  closeOverlay();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Yellow = minimize (close overlay, keep page)
document.getElementById('overlayMin').addEventListener('click', closeOverlay);

// Green = true browser fullscreen
document.getElementById('overlayFull').addEventListener('click', function() {
  const overlay = document.getElementById('gameOverlay');
  if (!document.fullscreenElement) {
    overlay.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('overlayClose').click();
});
</script>

<!-- MINI PLAYER -->
<div class="mini-player" id="miniPlayer">
  <div class="mini-player-bar">
    <span class="mini-player-title" id="miniTitle"></span>
    <button class="mini-expand" id="miniExpand">&#9974; Expand</button>
    <button class="mini-close-btn" id="miniClose"></button>
  </div>
  <div class="mini-frame" id="miniFrame" style="background:#111;display:flex;align-items:center;justify-content:center;color:#5a8fa8;font-family:Rajdhani,sans-serif;font-size:.9rem;">&#9654; Minimized</div>
</div>

<script>
// Settings
const settingsOverlay = document.getElementById('settingsOverlay');
document.querySelector('.gear-btn').addEventListener('click', () => {
  settingsOverlay.classList.add('open');
  document.getElementById('tabTitleInput').value = document.title === 'Pacific Tide – Games' ? '' : document.title;
});
document.getElementById('settingsClose').addEventListener('click', () => settingsOverlay.classList.remove('open'));
settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('open'); });
document.getElementById('settingsSave').addEventListener('click', () => {
  const val = document.getElementById('tabTitleInput').value.trim();
  document.title = val || 'Pacific Tide – Games';
  settingsOverlay.classList.remove('open');
});

// Mini player (yellow button)
const miniPlayer = document.getElementById('miniPlayer');
const miniFrame  = document.getElementById('miniFrame');
const miniTitle  = document.getElementById('miniTitle');

// Override yellow btn for game overlay
document.getElementById('overlayMin').addEventListener('click', function() {
  const src   = document.getElementById('gameFrame').src;
  const title = document.getElementById('overlayTitle').textContent;
  if (!src) return;
  miniFrame.src = src;
  miniTitle.textContent = title;
  miniPlayer.classList.add('visible');
  // hide overlay
  document.getElementById('ruffleContainer').innerHTML = '';
  document.getElementById('gameOverlay').style.display = 'none';
  document.body.style.overflow = '';
}, true);

// Override yellow btn for proxy
document.getElementById('proxyMin').addEventListener('click', function() {
  const src = document.getElementById('proxyFrame').src;
  const url = document.getElementById('iframeUrlBar').value;
  if (!src) return;
  miniFrame.src = src;
  miniTitle.textContent = url;
  miniPlayer.classList.add('visible');
  document.getElementById('iframeClose').click();
}, true);

// Expand mini player back to overlay
document.getElementById('miniExpand').addEventListener('click', function(e) {
  e.stopPropagation();
  miniPlayer.classList.remove('visible');
  if (_lastGame) {
    launchGame(_lastGame);
  }
});

// Click mini player to expand
miniPlayer.addEventListener('click', function() {
  document.getElementById('miniExpand').click();
});

// Close mini player
document.getElementById('miniClose').addEventListener('click', function(e) {
  e.stopPropagation();
  miniFrame.src = '';
  miniPlayer.classList.remove('visible');
});
</script>
