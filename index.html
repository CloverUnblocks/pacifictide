<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pacific Tide | Relaxed Browsing</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  /* Chillday-style Palette */
  --bg: #f8fafc; 
  --card: #ffffff;
  --text: #1e293b;
  --muted: #64748b;
  --accent: #6366f1; 
  --accent-soft: #eef2ff;
  --border: #e2e8f0;
  --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background: var(--bg);
  color: var(--text);
  font-family: "DM Sans", sans-serif;
  min-height: 100vh;
  line-height: 1.5;
}

/* NAVIGATION */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5%; height: 75px;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.brand-name {
  font-family: "Outfit", sans-serif;
  font-weight: 800; font-size: 1.5rem;
  color: var(--text); letter-spacing: -0.03em;
  cursor: pointer;
}

.nav-links { display: flex; gap: 8px; }
.nav-btn {
  padding: 10px 20px; border: none; border-radius: 14px;
  cursor: pointer; font-family: inherit; font-weight: 500;
  color: var(--muted); background: transparent; transition: 0.2s;
}
.nav-btn:hover { color: var(--text); background: var(--accent-soft); }
.nav-btn.active { color: var(--accent); background: var(--accent-soft); }

/* HERO SECTION */
.hero {
  padding: 100px 24px; text-align: center;
  max-width: 800px; margin: 0 auto;
}
.hero h1 {
  font-family: "Outfit", sans-serif;
  font-weight: 800; font-size: clamp(2.5rem, 8vw, 4rem);
  color: var(--text); letter-spacing: -0.05em; margin-bottom: 16px;
}
.hero p { color: var(--muted); font-size: 1.2rem; margin-bottom: 40px; }

/* SEARCH BOX */
.search-container {
  display: flex; align-items: center;
  background: var(--card); padding: 10px;
  border-radius: 24px; box-shadow: var(--shadow);
  border: 1px solid var(--border); max-width: 600px; margin: 0 auto;
}
.search-container input {
  flex: 1; border: none; outline: none;
  padding: 15px 20px; font-size: 1.1rem;
  background: transparent; color: var(--text);
}
.go-btn {
  padding: 15px 35px; background: var(--text); color: white;
  border: none; border-radius: 18px; font-weight: 600;
  cursor: pointer; transition: 0.3s;
}
.go-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

/* GAMES SECTION */
#gamesSection { padding: 40px 5%; display: none; max-width: 1200px; margin: 0 auto; }
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
}

.game-card {
  background: var(--card); border-radius: 24px;
  padding: 15px; border: 1px solid var(--border);
  box-shadow: var(--shadow); transition: 0.3s ease;
  cursor: pointer; text-align: center;
}
.game-card:hover { transform: scale(1.05); border-color: var(--accent); }
.game-thumb {
  width: 100%; aspect-ratio: 1; border-radius: 16px;
  background: var(--accent-soft); display: flex;
  align-items: center; justify-content: center;
  font-weight: 600; color: var(--accent); margin-bottom: 12px;
}

/* PROXY IFRAME */
#iframeWrap {
  display:none; position:fixed; inset:0; z-index:1000;
  flex-direction:column; background:white;
}
.iframe-nav {
  display:flex; align-items:center; padding:0 20px; height:60px;
  background: #fff; border-bottom: 1px solid var(--border); gap: 15px;
}
.proxy-frame { flex:1; border:none; background: #fff; }

.exit-btn {
  padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border);
  background: #f1f5f9; cursor: pointer; font-weight: 600;
}
</style>

<script src="/scramjet/scramjet.controller.js" type="module"></script>
</head>
<body>

<header class="topbar">
  <div class="brand-name" onclick="doHome()">Pacific Tide</div>
  <div class="nav-links">
    <button class="nav-btn active" id="btn-home" onclick="doHome()">Home</button>
    <button class="nav-btn" id="btn-games" onclick="showGames()">Games</button>
  </div>
</header>

<section class="hero" id="heroSection">
  <h1>Browse simply.</h1>
  <p>A clean, human-first space for the web.</p>
  <div class="search-container">
    <input type="text" id="urlInput" placeholder="Enter a URL or search..." autocomplete="off"/>
    <button class="go-btn" id="goBtn">Launch</button>
  </div>
</section>

<section id="gamesSection">
  <h2 style="margin-bottom:20px; font-family:'Outfit';">The Collection</h2>
  <div class="games-grid" id="gamesGrid"></div>
</section>

<div id="iframeWrap">
  <div class="iframe-nav">
    <button class="exit-btn" onclick="doHome()">Close</button>
    <input id="urlBar" style="flex:1; border:none; background:#f1f5f9; padding:10px; border-radius:10px;" readonly/>
  </div>
  <iframe class="proxy-frame" id="proxyFrame"></iframe>
</div>

<script type="module">
import { BareMuxConnection } from "/baremux/index.mjs";

// --- GAME DATA ---
const GAMES = [
  {title:'Age of War', url:'https://raw.githubusercontent.com/AmmarSAA/Flash-Games-Directory/main/age-of-war.swf', type:'flash'},
  {title:'Bloons TD 4', url:'https://raw.githubusercontent.com/AmmarSAA/Flash-Games-Directory/main/bloons-tower-defence-4.swf', type:'flash'},
  {title:'Doom', url:'https://raw.githubusercontent.com/AmmarSAA/Flash-Games-Directory/main/doom.swf', type:'flash'},
  {title:'Duck Life 4', url:'https://raw.githubusercontent.com/AmmarSAA/Flash-Games-Directory/main/duck-life-4.swf', type:'flash'},
  {title:"Papa's Pizzeria", url:'https://raw.githubusercontent.com/AmmarSAA/Flash-Games-Directory/main/papas-pizzeria.swf', type:'flash'},
  {title:'Super Mario 63', url:'https://raw.githubusercontent.com/AmmarSAA/Flash-Games-Directory/main/super-mario-63.swf', type:'flash'},
  {title:'Tron', url:'https://raw.githubusercontent.com/CloverUnblocks/pacifictide/main/games/fltron.swf', type:'flash'}
];

// --- NAVIGATION ---
window.doHome = () => {
    document.getElementById('heroSection').style.display = 'block';
    document.getElementById('gamesSection').style.display = 'none';
    document.getElementById('iframeWrap').style.display = 'none';
    document.getElementById('btn-home').classList.add('active');
    document.getElementById('btn-games').classList.remove('active');
    document.getElementById('proxyFrame').src = "";
};

window.showGames = () => {
    document.getElementById('heroSection').style.display = 'none';
    document.getElementById('gamesSection').style.display = 'block';
    document.getElementById('btn-home').classList.remove('active');
    document.getElementById('btn-games').classList.add('active');
    renderGames();
};

function renderGames() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = "";
    GAMES.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `<div class="game-thumb">Play</div><div style="font-weight:600;">${game.title}</div>`;
        card.onclick = () => launchGame(game);
        grid.appendChild(card);
    });
}

// --- SCRAMJET PROXY LOGIC ---
async function launchProxy(input) {
    let url = input.trim();
    if (!url.includes(".")) url = "https://www.google.com/search?q=" + encodeURIComponent(url);
    else if (!/^https?:\/\//.test(url)) url = "https://" + url;

    document.getElementById("urlBar").value = url;
    document.getElementById("iframeWrap").style.display = "flex";

    const { ScramjetController } = await import("/scramjet/scramjet.controller.js");
    const scram = new ScramjetController({
        prefix: "/scramjet/",
        files: { wasm: "/scramjet/scramjet.wasm.wasm", all: "/scramjet/scramjet.all.js" }
    });

    await scram.init();
    const frame = scram.createFrame(document.getElementById("proxyFrame"));
    frame.go(url);
}

function launchGame(game) {
    document.getElementById("iframeWrap").style.display = "flex";
    document.getElementById("urlBar").value = game.title;
    if(game.type === 'flash') {
        document.getElementById("proxyFrame").src = `https://ruffle.rs/demo/?file=${encodeURIComponent(game.url)}`;
    } else {
        launchProxy(game.url);
    }
}

// --- INIT SERVICE WORKER ---
(async function init() {
    if ("serviceWorker" in navigator) {
        try {
            await navigator.serviceWorker.register("/scramjet/scramjet.sw.js", { scope: "/scramjet/" });
            const conn = new BareMuxConnection("/baremux/worker.js");
            await conn.setTransport("/epoxy/index.mjs", [{ wisp: "wss://proxy.pacifictide.online/wisp/" }]);
        } catch (e) { console.error("Worker error:", e); }
    }
})();

document.getElementById("goBtn").onclick = () => launchProxy(document.getElementById("urlInput").value);
document.getElementById("urlInput").onkeydown = (e) => { if(e.key === 'Enter') launchProxy(e.target.value); };
</script>
</body>
</html>
