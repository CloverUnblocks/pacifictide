<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pacific Tide</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --c0: #020b10;
  --c1: #061420;
  --c2: #0a1f30;
  --c3: #0f2d42;
  --accent: #00b4d8;
  --accent2: #0077a8;
  --glow: rgba(0,180,216,0.22);
  --glow2: rgba(0,180,216,0.08);
  --text: #e0f2f9;
  --muted: #4d8fa8;
  --border: rgba(0,180,216,0.14);
  --glass: rgba(6,20,32,0.72);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;scroll-behavior:smooth}
body{
  background:var(--c0);
  color:var(--text);
  font-family:"DM Sans",sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── PARTICLES ── */
#particleCanvas{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;
  padding:0 24px;height:56px;
  background:rgba(2,11,16,0.85);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
.brand{
  display:flex;align-items:center;gap:9px;
  text-decoration:none;flex-shrink:0;
}
.brand-logo{height:30px;width:auto;filter:brightness(0) invert(1) drop-shadow(0 0 8px rgba(255,255,255,0.4))}
.brand-name{
  font-family:"Outfit",sans-serif;
  font-weight:700;font-size:1.15rem;
  color:var(--accent);
  letter-spacing:.02em;
}
.topbar-search{
  flex:1;max-width:480px;margin:0 auto;
  display:flex;align-items:center;
  background:var(--c2);
  border:1.5px solid var(--border);
  border-radius:10px;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.topbar-search:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--glow2);
}
.topbar-search input{
  flex:1;border:none;outline:none;
  background:transparent;
  color:var(--text);
  font-family:"DM Sans",sans-serif;
  font-size:.9rem;
  padding:9px 14px;
}
.topbar-search input::placeholder{color:var(--muted)}
.topbar-search button{
  padding:0 14px;height:38px;
  border:none;background:transparent;
  color:var(--muted);cursor:pointer;
  font-size:1rem;transition:color .2s;
}
.topbar-search button:hover{color:var(--accent)}

.nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.nav-btn{
  padding:7px 14px;border:none;
  border-radius:8px;cursor:pointer;
  font-family:"DM Sans",sans-serif;
  font-size:.85rem;font-weight:500;
  color:var(--muted);
  background:transparent;
  transition:color .2s,background .2s;
  white-space:nowrap;
}
.nav-btn:hover{color:var(--text);background:var(--c2)}
.nav-btn.active{color:var(--accent);background:rgba(0,180,216,0.08)}

/* ── HERO ── */
.hero{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 24px 48px;
  text-align:center;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:20px;
  background:rgba(0,180,216,0.1);
  border:1px solid rgba(0,180,216,0.25);
  font-size:.75rem;font-weight:600;color:var(--accent);
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:18px;
}
.hero-badge::before{
  content:"";width:6px;height:6px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 6px var(--accent);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{
  font-family:"Outfit",sans-serif;
  font-weight:700;font-size:clamp(2rem,5vw,3.5rem);
  line-height:1.1;
  background:linear-gradient(135deg,#e0f2f9 20%,var(--accent) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:10px;
}
.hero p{
  color:var(--muted);font-size:.95rem;
  max-width:420px;margin-bottom:28px;line-height:1.6;
}
.hero-searchbar{
  display:flex;align-items:center;
  width:100%;max-width:560px;
  background:var(--c2);
  border:1.5px solid var(--border);
  border-radius:14px;overflow:hidden;
  box-shadow:0 4px 32px rgba(0,180,216,0.08);
  transition:border-color .2s,box-shadow .2s;
}
.hero-searchbar:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--glow2),0 8px 40px rgba(0,180,216,0.12);
}
.hero-searchbar input{
  flex:1;border:none;outline:none;
  background:transparent;
  color:var(--text);
  font-family:"DM Sans",sans-serif;
  font-size:1rem;
  padding:14px 18px;
}
.hero-searchbar input::placeholder{color:var(--muted)}
.hero-go-btn{
  margin:6px;padding:8px 20px;
  border:none;border-radius:9px;
  background:var(--accent);color:#020b10;
  font-family:"Outfit",sans-serif;
  font-weight:700;font-size:.9rem;
  cursor:pointer;transition:opacity .15s,transform .1s;
  white-space:nowrap;
}
.hero-go-btn:hover{opacity:.85}
.hero-go-btn:active{transform:scale(.97)}

/* ── SECTION HEADERS ── */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;margin-bottom:18px;
}
.section-title{
  font-family:"Outfit",sans-serif;
  font-weight:600;font-size:1.1rem;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.section-title::before{
  content:"";width:3px;height:18px;border-radius:2px;
  background:var(--accent);
  box-shadow:0 0 8px var(--accent);
}
.section-count{
  font-size:.8rem;color:var(--muted);
  background:var(--c2);
  padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);
}

/* ── GAMES SECTION ── */
#gamesSection{display:none;position:relative;z-index:1;padding-bottom:60px}
#gamesSection.visible{display:block}

/* ── GAMES GRID ── */
.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;
  padding:0 24px;
}
.game-card{
  border-radius:12px;overflow:hidden;
  background:var(--c1);
  border:1px solid var(--border);
  cursor:pointer;
  transition:transform .18s,border-color .18s,box-shadow .18s;
  text-decoration:none;display:block;
}
.game-card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--accent);
  box-shadow:0 8px 28px rgba(0,180,216,0.18);
}
.game-card canvas{
  width:100%;aspect-ratio:16/10;
  display:block;background:#000;
}
.game-card-body{
  padding:9px 11px 10px;
}
.game-card-title{
  font-size:.8rem;font-weight:500;
  color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.game-card-tag{
  font-size:.68rem;color:var(--muted);
  margin-top:3px;
}

/* ── PROXY / URL BAR ── */
.proxy-section{
  position:relative;z-index:1;
  max-width:700px;margin:0 auto;padding:32px 24px 0;
}
.proxy-bar{
  display:flex;align-items:center;
  background:var(--c1);
  border:1.5px solid var(--border);
  border-radius:12px;overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
.proxy-bar input{
  flex:1;border:none;outline:none;
  background:transparent;
  color:var(--text);
  font-family:"DM Sans",sans-serif;
  font-size:.92rem;padding:12px 16px;
}
.proxy-bar input::placeholder{color:var(--muted)}
.proxy-bar button{
  padding:0 16px;height:44px;
  border:none;background:transparent;
  color:var(--muted);cursor:pointer;
  font-size:1rem;transition:color .2s;
}
.proxy-bar button:hover{color:var(--accent)}
.proxy-nav{
  display:flex;gap:6px;padding:0 14px;
  border-right:1px solid var(--border);
}
.proxy-nav button{
  padding:0 8px;height:44px;
  border:none;background:transparent;
  color:var(--muted);cursor:pointer;font-size:.9rem;
  transition:color .2s;
}
.proxy-nav button:hover{color:var(--accent)}
.quick-links{
  display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;
}
.quick-link{
  padding:5px 14px;border-radius:20px;
  background:var(--c2);
  border:1px solid var(--border);
  color:var(--muted);
  font-size:.8rem;font-weight:500;
  cursor:pointer;transition:color .2s,border-color .2s,background .2s;
  text-decoration:none;
}
.quick-link:hover{color:var(--accent);border-color:var(--accent);background:rgba(0,180,216,0.06)}

/* ── IFRAME WRAP ── */
#iframeWrap{
  display:none;
  position:fixed;inset:0;z-index:500;
  flex-direction:column;
  background:var(--c0);
}
#iframeWrap.visible{display:flex}
.iframe-toolbar{
  display:flex;align-items:center;gap:10px;
  padding:0 14px;height:42px;
  background:rgba(6,20,32,0.95);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
  flex-shrink:0;
}
.proxy-traffic-lights,.traffic-lights{display:flex;gap:7px;align-items:center}
.ptl,.tl{
  width:13px;height:13px;border-radius:50%;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:700;transition:opacity .15s;
  padding:0;flex-shrink:0;
}
.ptl span,.tl span{opacity:0;font-size:9px;line-height:1}
.ptl:hover span,.tl:hover span{opacity:1}
.ptl-red,.tl-red{background:#ff5f57}
.ptl-yellow,.tl-yellow{background:#febc2e}
.ptl-green,.tl-green{background:#28c840}
.iframe-url{
  flex:1;border:none;outline:none;
  background:var(--c2);
  color:var(--muted);
  font-family:"DM Sans",sans-serif;font-size:.8rem;
  padding:5px 10px;border-radius:7px;
  border:1px solid var(--border);
}
.proxy-frame{
  flex:1;width:100%;border:none;
  background:#000;
}

/* ── GAME OVERLAY ── */
#gameOverlay{
  display:none;
  position:fixed;inset:0;z-index:600;
  flex-direction:column;
  background:#000;
}
#gameOverlay.visible{display:flex}
.overlay-bar{
  display:flex;align-items:center;gap:10px;
  padding:0 14px;height:42px;
  background:rgba(6,20,32,0.95);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.overlay-divider{width:1px;height:22px;background:var(--border);margin:0 4px}
.overlay-home{
  padding:5px 12px;border-radius:7px;
  border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:"DM Sans",sans-serif;font-size:.8rem;
  cursor:pointer;transition:color .2s,border-color .2s;
}
.overlay-home:hover{color:var(--text);border-color:var(--accent)}
.overlay-title{
  flex:1;font-family:"Outfit",sans-serif;
  font-size:.88rem;font-weight:600;
  color:var(--accent);text-align:center;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.overlay-newtab{
  font-size:.78rem;color:var(--muted);text-decoration:none;
  transition:color .2s;padding:5px 8px;
  border-radius:6px;
}
.overlay-newtab:hover{color:var(--accent);background:rgba(0,180,216,0.08)}

/* ── MINI PLAYER ── */
.mini-player{
  display:none;position:fixed;
  bottom:20px;right:20px;z-index:9998;
  width:260px;
  border-radius:12px;overflow:hidden;
  border:1.5px solid var(--accent);
  box-shadow:0 8px 36px rgba(0,180,216,0.3);
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  background:var(--c1);
}
.mini-player.visible{display:block}
.mini-player:hover{transform:scale(1.03);box-shadow:0 14px 48px rgba(0,180,216,0.4)}
.mini-player-bar{
  position:absolute;top:0;left:0;right:0;
  height:28px;background:rgba(6,20,32,0.9);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;padding:0 8px;gap:4px;
  z-index:1;
}
.mini-title{
  flex:1;font-size:.72rem;color:var(--muted);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.mini-player-bar button{
  border:none;background:transparent;
  color:var(--muted);cursor:pointer;font-size:.8rem;
  width:22px;height:22px;border-radius:5px;
  transition:color .15s,background .15s;
  display:flex;align-items:center;justify-content:center;
}
.mini-player-bar button:hover{color:var(--text);background:rgba(255,255,255,0.08)}
.mini-frame{
  width:100%;height:160px;
  background:var(--c2);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:.8rem;
}
.mini-frame iframe{width:100%;height:100%;border:none}

/* ── FOOTER ── */
footer{
  position:relative;z-index:1;
  text-align:center;padding:24px;
  border-top:1px solid var(--border);
  color:var(--muted);font-size:.78rem;
  margin-top:40px;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--c0)}
::-webkit-scrollbar-thumb{background:var(--c3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent2)}

/* ── SPINNER ── */
.spin{
  width:36px;height:36px;border-radius:50%;
  border:3px solid var(--c3);
  border-top-color:var(--accent);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NO RESULTS ── */
.no-results{
  grid-column:1/-1;text-align:center;
  padding:60px 24px;color:var(--muted);font-size:.95rem;
}
</style>
<script src="/scramjet/scramjet.bundle.js"></script>
</head>

// ── RUFFLE ──
const ruffleScript = document.createElement("script");
ruffleScript.src = "https://unpkg.com/@ruffle-rs/ruffle";
document.head.appendChild(ruffleScript);

let _lastGame = null;

function showError(container, msg) {
  container.innerHTML = '<div style="color:#ff6b6b;font-size:.9rem;text-align:center;padding:20px;">' + msg + '</div>';
}

function waitForRuffle(cb, tries) {
  tries = tries || 0;
  if (window.RufflePlayer) { cb(false); return; }
  if (tries > 40) { cb(true); return; }
  setTimeout(() => waitForRuffle(cb, tries + 1), 250);
}

function closeOverlay() {
  document.getElementById('ruffleContainer').innerHTML = '';
  document.getElementById('gameOverlay').style.display = '';
  document.getElementById('gameOverlay').classList.remove('visible');
  document.body.style.overflow = '';
}

function launchGame(g) {
  const overlay = document.getElementById('gameOverlay');
  overlay.style.display = 'flex';
  overlay.classList.add('visible');
  document.body.style.overflow = 'hidden';
  const container = document.getElementById('ruffleContainer');
  container.innerHTML = '';
  document.getElementById('overlayTitle').textContent = g.title;
  document.getElementById('overlayNewTab').href = g.url;
  if (!g.swf) {
    const ifr = document.createElement('iframe');
    ifr.src = g.url;
    ifr.style.cssText = 'width:100%;height:100%;border:none;';
    ifr.sandbox = 'allow-forms allow-scripts allow-same-origin allow-popups';
    container.appendChild(ifr);
    return;
  }
  container.innerHTML = '<div class="spin"></div>';
  waitForRuffle(function(timedOut) {
    if (timedOut) { showError(container, 'Ruffle failed to load'); return; }
    container.innerHTML = '';
    try {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      player.style.cssText = 'width:100%;height:100%;';
      container.appendChild(player);
      player.load({ url: g.url, allowScriptAccess: false });
    } catch(e) { showError(container, 'Error loading game: ' + e.message); }
  });
}

// ── THUMBNAILS ──
function makeThumb(title) {
  const canvas = document.createElement('canvas');
  canvas.width = 300; canvas.height = 188;
  const ctx = canvas.getContext('2d');
  const palettes = [
    ['#003d5b','#0077a8','#00b4d8'],
    ['#001a2e','#004080','#0066cc'],
    ['#002233','#005577','#00aacc'],
    ['#001528','#003366','#0055aa'],
    ['#00101c','#002244','#0044aa'],
    ['#001020','#003355','#0077bb'],
  ];
  const pal = palettes[Math.abs(title.charCodeAt(0) + title.length) % palettes.length];
  const grd = ctx.createLinearGradient(0,0,300,188);
  grd.addColorStop(0,pal[0]);grd.addColorStop(.5,pal[1]);grd.addColorStop(1,pal[2]);
  ctx.fillStyle = grd; ctx.fillRect(0,0,300,188);
  // grid lines
  ctx.strokeStyle = 'rgba(0,180,216,0.08)';ctx.lineWidth = 1;
  for(let i=0;i<300;i+=24){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,188);ctx.stroke();}
  for(let i=0;i<188;i+=24){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(300,i);ctx.stroke();}
  // glow circle
  const rg = ctx.createRadialGradient(150,94,10,150,94,90);
  rg.addColorStop(0,'rgba(0,180,216,0.18)');rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.fillRect(0,0,300,188);
  // text
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = 'bold 14px "DM Sans",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const words = title.split(' '), lines = [], max = 18;
  let cur = '';
  words.forEach(w => { if((cur+' '+w).trim().length<=max){cur=(cur+' '+w).trim();}else{if(cur)lines.push(cur);cur=w;}});
  if(cur) lines.push(cur);
  const lh = 20, startY = 94 - (lines.length-1)*lh/2;
  lines.forEach((l,i) => ctx.fillText(l, 150, startY + i*lh));
  return canvas;
}

function makeCard(g) {
  const a = document.createElement('a');
  a.className = 'game-card'; a.href = '#';
  a.addEventListener("click", e => { e.preventDefault(); _lastGame = g; launchGame(g); });
  const canvas = makeThumb(g.title);
  const body = document.createElement('div'); body.className = 'game-card-body';
  const title = document.createElement('div'); title.className = 'game-card-title'; title.textContent = g.title;
  const tag = document.createElement('div'); tag.className = 'game-card-tag'; tag.textContent = g.swf ? 'Flash' : 'HTML5';
  body.appendChild(title); body.appendChild(tag);
  a.appendChild(canvas); a.appendChild(body);
  return a;
}

function render(games) {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = '';
  document.getElementById('gamesCount').textContent = games.length + ' game' + (games.length !== 1 ? 's' : '');
  if (!games.length) {
    const d = document.createElement('div');
    d.className = 'no-results'; d.textContent = 'No games found.';
    grid.appendChild(d); return;
  }
  const frag = document.createDocumentFragment();
  games.forEach(g => frag.appendChild(makeCard(g)));
  grid.appendChild(frag);
}

document.getElementById("gameSearch").addEventListener("input", e => {

  render(q ? GAMES.filter(g => g.title.toLowerCase().includes(q)) : GAMES);
});

// ── PROXY ──
window.resolveURL = function resolveURL(input) {
  let url = input.trim();
  if (!url) return null;
  if (!url.includes(".") || url.includes(" "))
    url = "https://www.google.com/search?q=" + encodeURIComponent(url);
  else if (!/^https?:\/\//.test(url)) url = "https://" + url;
  return url;
}
window.navigate = async function navigate(input) {
  const raw = resolveURL(input);
  if (!raw) return;
  document.getElementById("iframeUrlBar").value = raw;
  document.getElementById("iframeWrap").classList.add("visible");
  document.getElementById("gamesSection").classList.remove("visible");
  document.getElementById("heroSection").style.display = "none";
  document.getElementById("topbarSearchWrap").style.display = "";
  setActiveNav("");

  if (!window._scramjetCtrl) {
    const { ScramjetController } = $scramjetLoadController();
    window._scramjetCtrl = new ScramjetController({
      prefix: "/scramjet/",
      files: {
        wasm: "/scramjet/scramjet.wasm.wasm",
        all: "/scramjet/scramjet.all.js",
        sync: "/scramjet/scramjet.sync.js",
      }
    });
    await window._scramjetCtrl.init();
  }

  const iframe = document.getElementById("proxyFrame");
  const frame = window._scramjetCtrl.createFrame(iframe);
  frame.go(raw);
}

// ── NAV (exposed globally for onclick handlers) ──
window.setActiveNav = function setActiveNav(label) {
  document.querySelectorAll(".nav-btn").forEach(b => {
    b.classList.toggle("active", b.textContent.trim().toLowerCase() === label.toLowerCase());
  });
}
window.doHome = function doHome() {
  document.getElementById("iframeWrap").classList.remove("visible");

  document.getElementById("heroSection").style.display = "";
  document.getElementById("topbarSearchWrap").style.display = "none";

}
window.showGames = function showGames() {
  document.getElementById("iframeWrap").classList.remove("visible");

  document.getElementById("heroSection").style.display = "none";
  document.getElementById("topbarSearchWrap").style.display = "";

}
window.navTo = function navTo(url) {
  document.getElementById("proxyInput").value = url;
  navigate(url);
  const label = url.includes("youtube") ? "youtube" : url.includes("google") ? "google" : "";
  if (label) setActiveNav(label);
}

// ── HERO SEARCH ──
document.getElementById("heroSearch").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const val = this.value.trim();
    if (!val) return;
    // If matches a game, show games filtered
    const match = GAMES.filter(g => g.title.toLowerCase().includes(val.toLowerCase()));
    if (match.length && !val.includes(".")) {
      document.getElementById("gameSearch").value = val;
      showGames();
      render(match);
    } else {
      navigate(val);
    }
  }
});
document.getElementById("heroGoBtn").addEventListener("click", function() {

  const match = GAMES.filter(g => g.title.toLowerCase().includes(val.toLowerCase()));
  if (match.length && !val.includes(".")) {
    document.getElementById("gameSearch").value = val;
    showGames();
    render(match);
  } else {
    navigate(val);
  }
});

<!-- PARTICLE SCRIPT -->
<script>
(function() {
  const canvas = document.getElementById("particleCanvas");
  const ctx = canvas.getContext("2d");
  const colors = [
    "rgba(0,180,216,","rgba(0,119,168,","rgba(0,60,120,",
    "rgba(30,200,240,","rgba(10,80,160,","rgba(80,210,240,"
  ];
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener("resize", resize); resize();
  function rand(a,b){return Math.random()*(b-a)+a;}
  function mkP() {
    return {
      x:rand(0,W),y:rand(0,H),
      vx:rand(-.14,.14),vy:rand(-.28,-.04),
      size:rand(1,3.2),
      alpha:rand(.12,.65),aDir:rand(.001,.0035),
      color:colors[Math.floor(Math.random()*colors.length)],
      twinkle:Math.random()>.45
    };
  }
  const COUNT = Math.max(60, Math.floor(window.innerWidth*window.innerHeight/7000));
  for(let i=0;i<COUNT;i++) particles.push(mkP());
  function draw() {
    ctx.clearRect(0,0,W,H);
    particles.forEach(p => {
      if(p.twinkle){p.alpha+=p.aDir;if(p.alpha>.72||p.alpha<.08)p.aDir*=-1;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=p.color+p.alpha+")";ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.y<-5)p.y=H+5;
      if(p.x<-5)p.x=W+5;
      if(p.x>W+5)p.x=-5;
    });
    // connection lines
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<85){
          ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);
          ctx.lineTo(particles[j].x,particles[j].y);
          ctx.strokeStyle="rgba(0,180,216,"+(0.055*(1-d/85))+")";
          ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<script>
// ── Scramjet Service Worker + Wisp Transport ──
(async function() {
  if (!("serviceWorker" in navigator)) {
    console.warn("Service workers not supported");
    window._scramjetReady = false;
    return;
  }
  try {
    // Register the service worker
    const reg = await navigator.serviceWorker.register("/scramjet/scramjet.sw.js", {
      scope: "/"
    });
    console.log("Scramjet SW registered:", reg.scope);
    await navigator.serviceWorker.ready;

    // Wait for ScramjetController to be available
    if (typeof ScramjetController !== "undefined") {
      const controller = new ScramjetController({
        prefix: "/scramjet/scramjet.html",
        files: {
          wasm: "/scramjet/scramjet.wasm.wasm",
          worker: "/scramjet/scramjet.sync.js",
          client: "/scramjet/scramjet.all.js",
        }
      });
      await controller.init();
      await controller.setTransport("/scramjet/scramjet.bundle.js", [{
        wisp: "wss://proxy.pacifictide.online/wisp/"
      }]);
      window._scramjetController = controller;
      window._scramjetReady = true;
      console.log("Scramjet ready!");
    } else {
      window._scramjetReady = true;
      console.log("Scramjet SW ready (no controller)!");
    }
  } catch(e) {
    console.error("Scramjet init failed:", e);
    window._scramjetReady = false;
  }
})();
</script>
