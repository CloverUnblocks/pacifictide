<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacific Tide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(99, 179, 237, 0.5);
            --accent: #63b3ed;
            --accent-glow: rgba(99, 179, 237, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(99, 179, 237, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            z-index: -1;
            animation: bgShift 15s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(-20px, -20px); }
        }

        /* Navbar */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: translateY(-2px);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 0 20px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .logo:hover .logo-icon {
            transform: rotate(10deg) scale(1.1);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--text-primary);
            background: var(--bg-card-hover);
        }

        .nav-links a.active {
            color: var(--accent);
            background: rgba(99, 179, 237, 0.1);
        }

        /* Main Content */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 70px);
            justify-content: center;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 0.8s ease;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .badge:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .badge-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff 0%, #9ca3af 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Search Box */
        .search-wrapper {
            width: 100%;
            max-width: 600px;
            animation: fadeInUp 1s ease;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.4rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: var(--bg-card-hover);
        }

        .search-icon {
            padding: 0 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
        }

        .search-box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 0.9rem 0;
            font-size: 1rem;
            color: var(--text-primary);
            font-family: inherit;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .search-btn {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        /* Quick Links */
        .quick-links {
            display: flex;
            gap: 0.8rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeInUp 1.2s ease;
        }

        .quick-link {
            padding: 0.6rem 1.2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .quick-link:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .quick-link:active {
            transform: translateY(0);
        }

        /* Footer */
        footer {
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            background: rgba(10, 14, 26, 0.5);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        footer a:hover {
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            nav {
                padding: 1rem;
            }

            .nav-links {
                gap: 0.2rem;
            }

            .nav-links a {
                padding: 0.4rem 0.7rem;
                font-size: 0.85rem;
            }

            .nav-links a span {
                display: none;
            }

            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .container {
                padding: 2rem 1rem;
            }

            .search-btn span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="navigate('home')">
            <div class="logo-icon">🌊</div>
            <span>Pacific Tide</span>
        </div>
        <ul class="nav-links">
            <li><a class="active" onclick="navigate('home')">🏠 <span>Home</span></a></li>
            <li><a onclick="navigate('games')">🎮 <span>Games</span></a></li>
            <li><a onclick="navigate('proxy')">🌐 <span>Proxy</span></a></li>
            <li><a onclick="navigate('settings')">⚙️ <span>Settings</span></a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="hero">
            <div class="badge">
                <div class="badge-dot"></div>
                <span>All systems operational</span>
            </div>
            <h1>Welcome to Pacific Tide</h1>
            <p class="subtitle">Fast, secure, and reliable web browsing. Search the web or enter any URL below.</p>
        </div>

        <div class="search-wrapper">
            <form class="search-box" onsubmit="handleSearch(event)">
                <div class="search-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <input type="text" id="searchInput" placeholder="Search the web or enter a URL..." autocomplete="off">
                <button type="submit" class="search-btn">
                    <span>Browse</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <div class="quick-links">
                <a class="quick-link" onclick="quickSearch('youtube.com')">▶️ YouTube</a>
                <a class="quick-link" onclick="quickSearch('discord.com')">💬 Discord</a>
                <a class="quick-link" onclick="quickSearch('reddit.com')">🔗 Reddit</a>
                <a class="quick-link" onclick="quickSearch('spotify.com')">🎵 Spotify</a>
                <a class="quick-link" onclick="navigate('games')">🎮 Games</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Pacific Tide · Made with 💙 · <a href="https://github.com/CloverUnblocks/pacifictide" target="_blank">GitHub</a></p>
    </footer>

    <script>
        // Navigation handler
        function navigate(page) {
            // Update active state
            document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active'));
            event.target.closest('a')?.classList.add('active');

            // Route to pages
            const routes = {
                'home': '/index.html',
                'games': '/games/index.html',
                'proxy': '/proxy.html',
                'settings': '/settings.html'
            };

            console.log(`Navigating to: ${page}`);
            // Uncomment when pages exist:
            // window.location.href = routes[page];
        }

        // Search handler
        function handleSearch(event) {
            event.preventDefault();
            const input = document.getElementById('searchInput');
            const query = input.value.trim();

            if (!query) {
                input.focus();
                return;
            }

            // Determine if URL or search query
            let url;
            if (query.includes('.') && !query.includes(' ')) {
                url = query.startsWith('http') ? query : `https://${query}`;
            } else {
                url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }

            console.log(`Loading: ${url}`);

            // Visual feedback
            const btn = event.target.querySelector('.search-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span>Loading...</span>';
            
            setTimeout(() => {
                btn.innerHTML = originalHTML;
            }, 1500);

            // When Scramjet proxy is configured:
            // window.location.href = `/proxy.html?url=${encodeURIComponent(url)}`;
        }

        // Quick search shortcut
        function quickSearch(site) {
            document.getElementById('searchInput').value = site;
            document.querySelector('.search-box').dispatchEvent(new Event('submit', { cancelable: true }));
        }

        // Focus search on '/' key
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });
    </script>
</body>
</html>
